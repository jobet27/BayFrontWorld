<template>
    <div class="login-page-bg">
        <div class="login-split-container">
            <div class="branding-pane">
                <c-login-header></c-login-header>
            </div>
            <div class="form-pane">
                <template if:true={isLoginMode}>
                    <c-custom-login-form onnavsignup={handleNavSignup}></c-custom-login-form>
                </template>
                <template if:false={isLoginMode}>
                    <c-signup-form onnavlogin={handleNavLogin}></c-signup-form>
                </template>
            </div>
        </div>
    </div>
</template>
