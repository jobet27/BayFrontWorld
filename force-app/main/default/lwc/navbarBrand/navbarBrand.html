<template>
    <div class="brand-section">
        <a href="/" class="brand-link" onclick={handleHomeClick} aria-label="Go to Homepage">
            <span class="slds-assistive-text">BayFront Hotel and Resorts</span>
            <!-- Custom Image Logo from Salesforce or Fallback SVG -->
            <template if:true={logoUrl}>
                <img src={logoUrl} alt="BayFront Hotel and Resorts Logo" class="brand-logo-img" />
            </template>
            <template if:false={logoUrl}>
                <svg class="brand-logo" width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img">
                    <title>BayFront Hotel and Resorts Logo</title>
                    <path d="M50 5L90 25V75L50 95L10 75V25L50 5Z" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M50 20V80" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
                    <path d="M30 40H70" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
                    <path d="M35 60H65" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="5" fill="#d4af37"/>
                </svg>
            </template>
            <template if:true={hasBrandName}>
                <span class="brand-text">{displayBrandText}</span>
            </template>
        </a>
    </div>
</template>
